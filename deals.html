<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals & Offers - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div id="scroll-progress"></div>
  <div id="app-header"></div>

  <main>
    <section class="page-banner">
      <div class="banner-bg">
        <video class="banner-video" autoplay muted loop playsinline>
          <source src="deals2.mp4" type="video/mp4">
        </video>
        <div class="banner-overlay"></div>
      </div>
      <div class="banner-content">
        <span class="section-tag">Deals</span>
        <h1 class="page-title">Best <span class="gold">Offers</span></h1>
        <p class="page-desc">Limited-time deals and exclusive savings on premium appliances</p>
      </div>
    </section>

    <section class="deals-page">
      <div class="deals-page-header">
        <div class="deals-category-filters" id="dealsFilters">
          <button class="filter-btn active" data-filter="all">All Deals</button>
        </div>
        <div class="deals-summary" id="dealsSummary"></div>
      </div>
      <div class="deals-grid" id="dealsGrid"></div>
    </section>
  </main>

  <div id="app-footer"></div>
  <div class="toast" id="toast"></div>
  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <script src="js/main.js"></script>
  <script src="js/deals.js"></script>
</body>
</html>
