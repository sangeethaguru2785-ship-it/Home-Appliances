<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div id="scroll-progress"></div>
  <div id="app-header"></div>

  <main>
    <section class="error-page">
      <div class="error-bg">
        <img src="images/404page.webp" alt="" class="error-bg-img">
        <div class="error-overlay"></div>
      </div>
      <div class="error-content reveal">
        <span class="error-code">404</span>
        <div class="error-divider"></div>
        <h1 class="error-title">Page Not <span class="gold">Found</span></h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="error-actions">
          <a href="index.html" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Home
          </a>
          <a href="products.html" class="btn-secondary">Browse Products</a>
        </div>
      </div>
      <div class="error-visual">
        <svg viewBox="0 0 200 200" width="200" height="200" fill="none">
          <circle cx="100" cy="100" r="85" stroke="#c7a254" stroke-width="1.5" opacity="0.15"/>
          <circle cx="100" cy="100" r="60" stroke="#c7a254" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
          <line x1="65" y1="65" x2="135" y2="135" stroke="#c7a254" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
          <line x1="135" y1="65" x2="65" y2="135" stroke="#c7a254" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
          <circle cx="100" cy="100" r="15" fill="#c7a254" opacity="0.1"/>
        </svg>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>
  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('app-header').innerHTML = renderHeader('');
    document.getElementById('app-footer').innerHTML = renderFooter();
    initCommon();
  </script>
</body>
</html>
