<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div id="scroll-progress"></div>
  <div id="app-header"></div>

  <main>
    <section class="page-banner">
      <div class="banner-bg">
        <video class="banner-video" autoplay muted loop playsinline>
          <source src="blog1.mp4" type="video/mp4">
        </video>
        <div class="banner-overlay"></div>
      </div>
      <div class="banner-content">
        <span class="section-tag">Blog</span>
        <h1 class="page-title">Home <span class="gold">Insights</span></h1>
        <p class="page-desc">Tips, guides, and inspiration for your modern home</p>
      </div>
    </section>

    <section class="blog-page">
      <div class="blog-filters" id="blogFilters">
        <button class="filter-btn active" data-filter="all">All Posts</button>
        <button class="filter-btn" data-filter="kitchen">Kitchen</button>
        <button class="filter-btn" data-filter="laundry">Laundry</button>
        <button class="filter-btn" data-filter="cooling">Cooling</button>
        <button class="filter-btn" data-filter="smart">Smart Home</button>
        <button class="filter-btn" data-filter="tips">Tips</button>
      </div>
      <div class="blog-grid" id="blogGrid"></div>
    </section>
  </main>

  <div id="app-footer"></div>
  <div class="toast" id="toast"></div>
  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
