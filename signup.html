<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div id="scroll-progress"></div>
  <div id="app-header"></div>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-image">
        <img src="images/login1.webp" alt="">
      </div>
      <div class="auth-card">
        <a href="index.html" class="logo"><img src="images/logo.webp" alt="Stackly" class="logo-img" height="42"></a>
        <h1>Create Account</h1>
        <p class="subtitle">Join Stackly and start shopping</p>

        <div class="auth-role-toggle">
          <button class="role-btn active" data-role="user">User</button>
          <button class="role-btn" data-role="admin">Admin</button>
        </div>

        <div class="auth-error" id="signupError"></div>

        <form id="signupForm" autocomplete="off">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" pattern="[A-Za-z\s]+" title="Only letters allowed" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create a password" required>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="auth-btn">Create Account<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>
  <div class="toast" id="toast"></div>
  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
