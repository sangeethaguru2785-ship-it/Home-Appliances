<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div id="scroll-progress"></div>
  <div id="app-header"></div>

  <main>
    <section class="page-banner">
      <div class="banner-bg">
        <img src="images/cart.webp" alt="" class="banner-bg-img">
        <div class="banner-overlay"></div>
      </div>
      <div class="banner-content">
        <span class="section-tag">Cart</span>
        <h1 class="page-title">Your <span class="gold">Cart</span></h1>
        <p class="page-desc">Review and manage your items</p>
      </div>
    </section>

    <section class="cart-page">
      <div class="cart-page-layout">
        <div class="cart-page-items" id="cartPageItems"></div>
        <div class="cart-page-summary" id="cartPageSummary"></div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>
  <div class="toast" id="toast"></div>
  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
